build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInInterfaces: 15
    thresholdInObjects: 20

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    maxLineLength: 150
  WildcardImport:
    active: false
  UnusedPrivateMember:
    active: true
    allowedNames: "(_.*)"

naming:
  FunctionNaming:
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Z][A-Za-z0-9]*|[a-z][a-zA-Z0-9]*"
